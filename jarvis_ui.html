<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S.</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root {
    --cyan:  #00d4ff;
    --green: #00ff88;
    --amber: #ffaa00;
    --dim:   #003355;
    --bg:    #000810;
    --panel: rgba(0,40,80,0.45);
    --glow:  0 0 12px #00d4ff88, 0 0 30px #00d4ff33;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cyan);
    font-family: 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  #hud-canvas { position: fixed; inset: 0; z-index: 0; }

  #app {
    position: relative; z-index: 1;
    display: grid;
    grid-template-rows: 48px 1fr 210px;
    grid-template-columns: 260px 1fr 260px;
    height: 100vh;
    padding: 16px;
    gap: 12px;
  }

  /* ── Top bar ── */
  #topbar {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--dim);
    padding-bottom: 8px;
  }
  .brand { font-size: 22px; letter-spacing: 8px; font-weight: bold; text-shadow: var(--glow); }
  .brand span { color: #ffffff44; }
  #clock { font-size: 13px; color: #007799; letter-spacing: 3px; }
  #status-badge {
    font-size: 11px; letter-spacing: 3px;
    padding: 4px 16px;
    border: 1px solid var(--cyan); border-radius: 2px;
    text-shadow: var(--glow);
    transition: color .4s, border-color .4s;
  }
  #status-badge.processing { color: var(--amber); border-color: var(--amber); }
  #status-badge.speaking   { color: var(--green); border-color: var(--green); }

  /* ── Side panels ── */
  #panel-left  { grid-column: 1; grid-row: 2; display: flex; flex-direction: column; gap: 10px; }
  #panel-right { grid-column: 3; grid-row: 2; display: flex; flex-direction: column; gap: 10px; }

  .data-card {
    background: var(--panel);
    border: 1px solid var(--dim); border-left: 2px solid var(--cyan);
    padding: 10px 12px; font-size: 10px; line-height: 1.7;
    flex: 1; overflow: hidden;
    transition: border-color .4s;
  }
  .data-card.fresh { border-left-color: var(--green); }
  .data-card h4 {
    font-size: 9px; letter-spacing: 3px; color: #005577;
    margin-bottom: 6px; border-bottom: 1px solid var(--dim); padding-bottom: 4px;
  }
  .data-card .row { color: #007799; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .up   { color: var(--green) !important; }
  .down { color: #ff4455 !important; }
  .muted { color: #003344; }

  /* ── Center ── */
  #center {
    grid-column: 2; grid-row: 2;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  #core-wrap { position: relative; width: 280px; height: 280px; }
  #core-canvas { position: absolute; inset: 0; }

  #core-label {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; pointer-events: none;
  }
  #core-status { font-size: 11px; letter-spacing: 5px; text-shadow: var(--glow); transition: color .4s; }
  #core-hint   { font-size: 9px; color: #005577; letter-spacing: 2px; }

  /* clap dots */
  #clap-dots { display: flex; gap: 8px; margin-top: 4px; }
  .cdot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1px solid var(--dim); transition: all .15s;
  }
  .cdot.lit { background: var(--cyan); border-color: var(--cyan); box-shadow: var(--glow); }

  /* pulse ring */
  #pulse-ring {
    position: absolute; inset: 0;
    border-radius: 50%; border: 2px solid var(--cyan);
    opacity: 0; pointer-events: none;
  }
  #pulse-ring.active { animation: pulse 1.1s ease-out infinite; }
  @keyframes pulse {
    0%   { transform: scale(1);    opacity: .65; }
    100% { transform: scale(1.38); opacity: 0; }
  }

  /* ── Briefing panel ── */
  #briefing-panel {
    grid-column: 1 / -1; grid-row: 3;
    background: var(--panel);
    border: 1px solid var(--dim); border-top: 2px solid var(--cyan);
    padding: 14px 20px; position: relative; overflow: hidden;
  }
  #briefing-panel h4 { font-size: 9px; letter-spacing: 4px; color: #005577; margin-bottom: 8px; }
  #briefing-text {
    font-size: 12px; line-height: 1.9; color: #aaddff;
    max-height: 160px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 8px;
  }
  #briefing-text::-webkit-scrollbar { width: 3px; }
  #briefing-text::-webkit-scrollbar-thumb { background: var(--dim); }

  /* scan-line overlay */
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px,
      rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
  }

  /* trigger button */
  #trigger-btn {
    margin-top: 10px;
    background: none; border: 1px solid var(--dim);
    color: #005577; font-family: inherit; font-size: 9px;
    letter-spacing: 3px; padding: 5px 16px; cursor: pointer;
    transition: all .25s;
  }
  #trigger-btn:hover { border-color: var(--cyan); color: var(--cyan); }

  /* mic meter */
  #mic-bar-wrap {
    margin-top: 8px; width: 180px; height: 4px;
    background: var(--dim); border-radius: 2px; overflow: hidden;
  }
  #mic-bar { height: 100%; width: 0%; background: var(--cyan); transition: width .05s; }
  #mic-label { font-size: 8px; color: #004466; letter-spacing: 2px; margin-top: 3px; }
</style>
</head>
<body>

<canvas id="hud-canvas"></canvas>

<div id="app">

  <div id="topbar">
    <div class="brand">J<span>.</span>A<span>.</span>R<span>.</span>V<span>.</span>I<span>.</span>S<span>.</span></div>
    <div id="status-badge">STANDBY</div>
    <div id="clock"></div>
  </div>

  <div id="panel-left">
    <div class="data-card" id="card-trends">
      <h4>TRENDING SEARCHES</h4>
      <div class="row muted">대기 중...</div>
    </div>
    <div class="data-card" id="card-youtube">
      <h4>YOUTUBE TRENDING</h4>
      <div class="row muted">대기 중...</div>
    </div>
  </div>

  <div id="center">
    <div id="core-wrap">
      <canvas id="core-canvas" width="280" height="280"></canvas>
      <div id="core-label">
        <div id="core-status">STANDBY</div>
        <div id="core-hint">"HEY JARVIS" · DOUBLE CLAP</div>
        <div id="clap-dots">
          <div class="cdot" id="cd0"></div>
          <div class="cdot" id="cd1"></div>
        </div>
      </div>
      <div id="pulse-ring" class="active"></div>
    </div>
    <button id="trigger-btn" onclick="manualTrigger()">▶ MANUAL TRIGGER</button>
    <div id="mic-bar-wrap"><div id="mic-bar"></div></div>
    <div id="mic-label">MIC INITIALIZING...</div>
  </div>

  <div id="panel-right">
    <div class="data-card" id="card-news">
      <h4>TOP NEWS</h4>
      <div class="row muted">대기 중...</div>
    </div>
    <div class="data-card" id="card-stocks">
      <h4>MARKET DATA</h4>
      <div class="row muted">대기 중...</div>
    </div>
  </div>

  <div id="briefing-panel">
    <h4>JARVIS BRIEFING</h4>
    <div id="briefing-text">시스템 대기 중. "헤이 자비스" 또는 박수 두 번으로 브리핑을 시작하세요.</div>
  </div>

</div>

<script>
// ── Clock ──────────────────────────────────────────────────────────────────
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('ko-KR', {hour12:false}) + ' · ' +
    new Date().toLocaleDateString('ko-KR', {month:'short', day:'numeric', weekday:'short'});
}
setInterval(tick, 1000); tick();

// ── HUD background canvas ──────────────────────────────────────────────────
(function(){
  const c = document.getElementById('hud-canvas'), ctx = c.getContext('2d');
  let W, H;
  const resize = () => { W = c.width = innerWidth; H = c.height = innerHeight; };
  window.addEventListener('resize', resize); resize();

  const pts = Array.from({length:55}, () => ({
    x: Math.random(), y: Math.random(),
    vx: (Math.random()-.5)*.00015, vy: (Math.random()-.5)*.00015,
    r: Math.random()*1.2+.3, a: Math.random()
  }));

  function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='rgba(0,55,90,.15)'; ctx.lineWidth=.5;
    const s=52;
    for(let row=-1; row<H/s+2; row++)
      for(let col=-1; col<W/s+2; col++){
        const x=col*s*1.5, y=row*s*Math.sqrt(3)+(col%2)*s*Math.sqrt(3)/2;
        ctx.beginPath();
        for(let i=0;i<6;i++){const a=Math.PI/3*i; ctx[i?'lineTo':'moveTo'](x+s*Math.cos(a),y+s*Math.sin(a));}
        ctx.closePath(); ctx.stroke();
      }
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=1; if(p.x>1)p.x=0; if(p.y<0)p.y=1; if(p.y>1)p.y=0;
      ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,180,255,${p.a*.35})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Core ring animation ────────────────────────────────────────────────────
const coreState = (function(){
  const c = document.getElementById('core-canvas');
  const ctx = c.getContext('2d');
  const W=280, H=280, cx=140, cy=140;
  let appState='idle', t=0;

  const rings=[
    {r:120,speed:.003, gap:.4,w:1.5,dash:[8,4]},
    {r:100,speed:-.005,gap:.2,w:1,  dash:[4,8]},
    {r:80, speed:.008, gap:.5,w:2,  dash:[]},
    {r:60, speed:-.012,gap:.1,w:1,  dash:[2,10]},
  ];

  function base(){
    return appState==='idle'       ? 'rgba(0,180,255,'
         : appState==='processing' ? 'rgba(255,170,0,'
         :                           'rgba(0,255,136,';
  }

  function draw(){
    t++;
    ctx.clearRect(0,0,W,H);
    const b=base();
    const g=ctx.createRadialGradient(cx,cy,38,cx,cy,128);
    g.addColorStop(0,b+'.07)'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    rings.forEach((ring,i)=>{
      const angle=t*ring.speed;
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
      ctx.beginPath(); ctx.arc(0,0,ring.r,ring.gap,Math.PI*2-ring.gap);
      ctx.strokeStyle=b+(0.45+0.22*Math.sin(t*.02+i))+')';
      ctx.lineWidth=ring.w;
      ctx.setLineDash(ring.dash.length?ring.dash:[]); ctx.stroke(); ctx.restore();
    });

    const pulse=0.6+0.4*Math.sin(t*(appState==='speaking'?.14:.04));
    ctx.beginPath(); ctx.arc(cx,cy,11*pulse,0,Math.PI*2);
    ctx.fillStyle=b+'.9)'; ctx.fill();

    ctx.save(); ctx.translate(cx,cy); ctx.rotate(t*.005);
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=Math.PI/3*i; ctx[i?'lineTo':'moveTo'](30*Math.cos(a),30*Math.sin(a));}
    ctx.closePath(); ctx.strokeStyle=b+'.35)'; ctx.lineWidth=1; ctx.setLineDash([]); ctx.stroke();
    ctx.restore();

    requestAnimationFrame(draw);
  }
  draw();

  return { set(s){ appState=s; } };
})();

// ── UI state ───────────────────────────────────────────────────────────────
const LABELS = {
  idle:       ['STANDBY',     'STANDBY',     '"HEY JARVIS" · DOUBLE CLAP'],
  processing: ['PROCESSING',  'ANALYZING',   ''],
  speaking:   ['BROADCASTING','BROADCASTING',''],
};

function setUI(status){
  const [badge, core, hint] = LABELS[status] || LABELS.idle;
  const badgeEl = document.getElementById('status-badge');
  badgeEl.textContent = badge; badgeEl.className = status;
  document.getElementById('core-status').textContent = core;
  document.getElementById('core-hint').textContent = hint;
  document.getElementById('clap-dots').style.display = status==='idle' ? 'flex' : 'none';
  document.getElementById('pulse-ring').className = status==='idle' ? 'active' : '';
  coreState.set(status);
}

// ── Socket.IO ──────────────────────────────────────────────────────────────
const socket = io();

socket.on('connect',    ()  => console.log('[ws] connected'));
socket.on('disconnect', ()  => console.log('[ws] disconnected'));

socket.on('state', ({status}) => {
  setUI(status);
  // 채팅 내용 절대 리셋 안 함
});

socket.on('wake', ({heard}) => {
  console.log('[wake]', heard);
  flashDots();
});

// 데이터 수집 중 즉시 재생 — 공백 없애기
socket.on('speak_now', text => {
  speakKorean(text);
});

socket.on('clap', ({count}) => {
  document.getElementById('cd0').classList.toggle('lit', count>=1);
  document.getElementById('cd1').classList.toggle('lit', count>=2);
  if(count>=2) setTimeout(()=>{
    document.getElementById('cd0').classList.remove('lit');
    document.getElementById('cd1').classList.remove('lit');
  }, 400);
});

// ── Chat log ────────────────────────────────────────────────────────────────
const chatEl = document.getElementById('briefing-text');

// 사용자가 위로 스크롤하면 자동 스크롤 멈춤, 맨 아래면 재개
let _userScrolled = false;
chatEl.addEventListener('scroll', () => {
  const atBottom = chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight < 60;
  _userScrolled = !atBottom;
});
function scrollBottom() {
  if (!_userScrolled) chatEl.scrollTop = chatEl.scrollHeight;
}
let currentJarvisEl = null;   // 현재 스트리밍 중인 JARVIS 말풍선
let speakBuffer = '';
const SPLIT_RE = /(?<=[.!?\n。])\s+/;

function appendMessage(role, text) {
  const wrap = document.createElement('div');
  wrap.style.cssText = role === 'jarvis'
    ? 'padding: 8px 12px; border-left: 2px solid #00d4ff; margin-bottom: 4px;'
    : 'padding: 8px 12px; border-right: 2px solid #00ff88; text-align: right; margin-bottom: 4px;';

  const label = document.createElement('div');
  label.style.cssText = role === 'jarvis'
    ? 'font-size:9px; letter-spacing:3px; color:#005577; margin-bottom:4px;'
    : 'font-size:9px; letter-spacing:3px; color:#007744; margin-bottom:4px;';
  label.textContent = role === 'jarvis' ? 'JARVIS' : 'YOU';

  const body = document.createElement('div');
  body.style.cssText = role === 'jarvis'
    ? 'color:#aaddff; white-space:pre-wrap; line-height:1.8;'
    : 'color:#00ff88; line-height:1.8;';
  body.textContent = text;

  wrap.appendChild(label);
  wrap.appendChild(body);
  chatEl.appendChild(wrap);
  scrollBottom();

  // _full 참조는 body에
  wrap._bodyEl = body;
  return wrap;
}

let _fullText = '';

socket.on('text_chunk', chunk => {
  _fullText += chunk;
  if (!currentJarvisEl) currentJarvisEl = appendMessage('jarvis', '');
  currentJarvisEl._full = _fullText;
  currentJarvisEl._bodyEl.textContent = _fullText;
  scrollBottom();
});

socket.on('text_done', () => {
  // 전체 텍스트 한 번에 TTS
  if (_fullText.trim()) speakKorean(_fullText.trim());
  _fullText = '';
  currentJarvisEl = null;
  setTimeout(enterConversationMode, 500);
});

socket.on('chat_user', text => {
  // 실시간 말풍선이 이미 있으면 중복 방지
  currentJarvisEl = null;
});

socket.on('data', data => renderCards(data));

socket.on('log', msg => {
  if (!currentJarvisEl && chatEl.children.length === 0)
    chatEl.textContent = msg;
});

socket.on('error', msg => {
  appendMessage('jarvis', 'Error: ' + msg);
});

// ── Manual trigger ─────────────────────────────────────────────────────────
function manualTrigger(){
  socket.emit('trigger');
}

// Space bar
document.addEventListener('keydown', e => {
  if(e.code==='Space'){ e.preventDefault(); manualTrigger(); }
});

const micBar = document.getElementById('mic-bar');

const micLabel = document.getElementById('mic-label');
micLabel.textContent = '"헤이 자비스" 또는 SPACE';
micLabel.style.color = '#005577';

// ── 음성 인식 (SpeechRecognition 하나로 웨이크워드 + 대화 통합) ──────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let _rec      = null;
let _inConv   = false;
let _interimEl = null;
let _sendLock  = false;

function startListening() {
  if (!SR) { micLabel.textContent = 'Speech API 미지원'; return; }
  if (_rec) { try { _rec.abort(); } catch(e){} }

  _rec = new SR();
  _rec.lang = 'ko-KR';
  _rec.continuous = true;
  _rec.interimResults = true;

  _rec.onstart = () => {
    micLabel.textContent = _inConv ? '🎤 말씀하세요...' : '"헤이 자비스" 대기 중';
    micLabel.style.color = _inConv ? 'var(--green)' : '#005577';
  };

  let _procIdx = 0;  // 처리된 result 인덱스 추적

  _rec.onresult = (e) => {
    // 새로 추가된 결과만 처리 (이전 누적 결과 무시)
    const newFinals = [];
    let interimText = '';

    for (let i = _procIdx; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        newFinals.push(e.results[i][0].transcript.trim());
        _procIdx = i + 1;
      } else {
        interimText = e.results[i][0].transcript.trim();
      }
    }

    const newFinal  = newFinals.join(' ').trim();
    const allText   = (interimText || newFinal).toLowerCase();
    const WAKE      = ['헤이 자비스','hey jarvis','자비스','jarvis','헤이자비스'];

    // 말 시작하는 순간 즉시 오디오 중단
    if (_inConv && interimText && !_interimEl) {
      stopSpeaking();
    }

    // 실시간 표시 (대화 모드일 때만)
    if (_inConv && (interimText || newFinal)) {
      if (!_interimEl) {
        _interimEl = document.createElement('div');
        _interimEl.style.cssText = 'padding:8px 12px; border-right:2px solid #00ff8866; text-align:right; margin-bottom:4px; opacity:0.6;';
        const lb = document.createElement('div');
        lb.style.cssText = 'font-size:9px; letter-spacing:3px; color:#007744; margin-bottom:4px;';
        lb.textContent = 'YOU';
        const bd = document.createElement('div');
        bd.style.cssText = 'color:#00ff88; line-height:1.8;';
        _interimEl._b = bd;
        _interimEl.appendChild(lb); _interimEl.appendChild(bd);
        chatEl.appendChild(_interimEl);
      }
      _interimEl._b.textContent = interimText || newFinal;
      scrollBottom();
    }

    // 웨이크워드 감지
    if (WAKE.some(w => allText.includes(w))) {
      document.getElementById('core-status').textContent = 'ACTIVATED';
      micLabel.textContent = '✅ 헤이 자비스!';
      stopSpeaking();
      _procIdx = e.results.length;
      (async () => {
        try {
          const ctx = _getCtx();
          if (ctx.state === 'suspended') await ctx.resume();
          const res = await fetch('/yes_sir');
          const decoded = await ctx.decodeAudioData(await res.arrayBuffer());
          const src = ctx.createBufferSource();
          src.buffer = decoded; src.connect(ctx.destination); src.start(0);
        } catch(e) {}
      })();
      manualTrigger();
      try { _rec.abort(); } catch(e){}
      setTimeout(() => { _procIdx = 0; try { _rec.start(); } catch(e){} }, 500);
      return;
    }

    if (!newFinal) return;

    // 채팅창에 고정
    if (_interimEl) {
      _interimEl.style.opacity = '1';
      _interimEl.style.borderRightColor = '#00ff88';
      _interimEl = null;
    }

    // 중복 방지: sendLock 중이면 무시
    if (_inConv && !_sendLock) {
      _sendLock = true;
      stopSpeaking();
      socket.emit('user_message', { text: newFinal });
      setTimeout(() => { _sendLock = false; }, 3000);
    }
  };

  _rec.onerror = (e) => {
    if (e.error === 'not-allowed') {
      micLabel.textContent = '마이크 허용 필요';
      micLabel.style.color = '#ff4455';
      return;
    }
  };

  _rec.onend = () => {
    _procIdx = 0;
    setTimeout(() => { try { _rec.start(); } catch(e){} }, 300);
  };

  try { _rec.start(); } catch(e) { console.warn(e); }
}

function enterConversationMode() { _inConv = true; }
function exitConversationMode()  { _inConv = false; }

startListening();

// ── Clap dot flash ─────────────────────────────────────────────────────────
function flashDots(){
  ['cd0','cd1'].forEach((id,i)=>setTimeout(()=>{
    const el=document.getElementById(id); el.classList.add('lit');
    setTimeout(()=>el.classList.remove('lit'),300);
  },i*120));
}

// ── Data cards ─────────────────────────────────────────────────────────────
function renderCards(data){
  if(data.trends){
    const el=document.getElementById('card-trends');
    el.innerHTML='<h4>TRENDING SEARCHES</h4>'+
      data.trends.map(t=>
        `<div class="row">${t.keyword}<span class="muted"> ${t.traffic}</span></div>`
      ).join('');
    el.classList.add('fresh'); setTimeout(()=>el.classList.remove('fresh'),2000);
  }
  if(data.youtube){
    const el=document.getElementById('card-youtube');
    el.innerHTML='<h4>YOUTUBE TRENDING</h4>'+
      data.youtube.map(v=>`<div class="row">${v.title}</div>`).join('');
    el.classList.add('fresh'); setTimeout(()=>el.classList.remove('fresh'),2000);
  }
  if(data.news){
    const el=document.getElementById('card-news');
    el.innerHTML='<h4>TOP NEWS</h4>'+
      data.news.map(n=>`<div class="row">${n}</div>`).join('');
    el.classList.add('fresh'); setTimeout(()=>el.classList.remove('fresh'),2000);
  }
  if(data.stocks){
    const el=document.getElementById('card-stocks');
    el.innerHTML='<h4>MARKET DATA</h4>'+
      data.stocks.map(s=>{
        const cls=s.change>=0?'up':'down', arrow=s.change>=0?'▲':'▼';
        return `<div class="row">${s.symbol} $${s.price.toLocaleString()} <span class="${cls}">${arrow}${Math.abs(s.change).toFixed(2)}%</span></div>`;
      }).join('');
    el.classList.add('fresh'); setTimeout(()=>el.classList.remove('fresh'),2000);
  }
}

// ── TTS — AudioContext 방식 (Safari autoplay 차단 우회) ──────────────────
let _actx = null;
let _currentSource = null;

// 페이지 로드 즉시 AudioContext 생성 (유저 제스처 전에 suspended 상태로 대기)
function _getCtx() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  return _actx;
}

// 첫 클릭/키입력으로 resume — 이후 모든 재생 허용
function _resumeCtx() {
  const ctx = _getCtx();
  if (ctx.state === 'suspended') ctx.resume();
}
document.addEventListener('click',   _resumeCtx);
document.addEventListener('keydown', _resumeCtx);
document.addEventListener('touchend',_resumeCtx);

async function speakKorean(text) {
  if (!text.trim()) return;
  stopSpeaking();
  try {
    const ctx = _getCtx();
    if (ctx.state === 'suspended') await ctx.resume();
    const res = await fetch('/tts?text=' + encodeURIComponent(text));
    const buf = await res.arrayBuffer();
    const decoded = await ctx.decodeAudioData(buf);
    const src = ctx.createBufferSource();
    src.buffer = decoded;
    src.connect(ctx.destination);
    src.start(0);
    _currentSource = src;
  } catch(e) {
    console.warn('TTS 실패:', e);
  }
}

function stopSpeaking() {
  if (_currentSource) {
    try { _currentSource.stop(); } catch(e) {}
    _currentSource = null;
  }
}
