<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S.</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#020814;}
#three-canvas{position:fixed;inset:0;z-index:0;}

/* 스캔라인 */
#scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,150,255,.012) 3px,rgba(0,150,255,.012) 6px);}

/* 타이틀 */
#title{
  position:fixed;bottom:140px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',monospace;font-size:clamp(18px,3vw,32px);
  letter-spacing:clamp(8px,2vw,20px);font-weight:900;
  color:#00D4FF;z-index:10;white-space:nowrap;
  text-shadow:0 0 20px #00D4FF,0 0 60px rgba(0,212,255,.5),0 0 100px rgba(0,100,255,.3);
}
#title-line{
  display:block;height:1px;width:100%;margin-top:8px;
  background:linear-gradient(to right,transparent,#00D4FF,transparent);
  opacity:.5;
}

/* HUD 코너 */
.hc{position:fixed;width:44px;height:44px;z-index:10;opacity:.5;}
.hc::before,.hc::after{content:'';position:absolute;background:#00D4FF;}
.hc::before{width:2px;height:100%;}
.hc::after{width:100%;height:2px;}
.hc.tl{top:18px;left:18px;}
.hc.tl::before,.hc.tl::after{top:0;left:0;}
.hc.tr{top:18px;right:18px;}
.hc.tr::before{top:0;right:0;}
.hc.tr::after{top:0;right:0;}
.hc.bl{bottom:18px;left:18px;}
.hc.bl::before{bottom:0;left:0;}
.hc.bl::after{bottom:0;left:0;}
.hc.br{bottom:18px;right:18px;}
.hc.br::before{bottom:0;right:0;}
.hc.br::after{bottom:0;right:0;}

/* 상태 */
#status-wrap{
  position:fixed;top:22px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:8px;z-index:10;
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:5px;color:rgba(0,212,255,.6);
}
#sdot{width:7px;height:7px;border-radius:50%;background:#00D4FF;animation:bk 1.4s ease-in-out infinite;}
@keyframes bk{0%,100%{opacity:1;}50%{opacity:.1;}}
#sdot.on{background:#00FF88;animation:none;opacity:1;}

/* 좌측 HUD */
#hud-l{position:fixed;left:24px;top:50%;transform:translateY(-50%);
  z-index:10;display:flex;flex-direction:column;gap:12px;opacity:.45;}
.hi{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:#00D4FF;
  border-left:1px solid rgba(0,212,255,.3);padding-left:8px;line-height:1.8;}
.hi span{display:block;color:rgba(0,212,255,.45);}

/* 우측 HUD */
#hud-r{position:fixed;right:24px;top:50%;transform:translateY(-50%);
  z-index:10;display:flex;flex-direction:column;gap:12px;opacity:.45;align-items:flex-end;}
.hr{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:#00D4FF;
  border-right:1px solid rgba(0,212,255,.3);padding-right:8px;line-height:1.8;text-align:right;}
.hr span{display:block;color:rgba(0,212,255,.45);}

/* 채팅 오버레이 */
#chat-overlay{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  padding:0 40px 20px;
  background:linear-gradient(to top,rgba(2,8,20,.95) 60%,transparent);
}

/* 실시간 인식 */
#listen-bar{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-top:1px solid rgba(0,212,255,.15);
  margin-bottom:8px;
}
#ldot{width:7px;height:7px;border-radius:50%;background:rgba(0,212,255,.25);flex-shrink:0;}
#ldot.on{background:#00FF88;box-shadow:0 0 8px #00FF88;animation:bk .8s ease-in-out infinite;}
#ltxt{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;
  color:rgba(0,212,255,.4);font-style:italic;flex:1;}

/* 메시지 */
#msgs{display:flex;flex-direction:column;gap:10px;max-height:180px;overflow:hidden;}
.mw{display:flex;flex-direction:column;gap:2px;}
.ml{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:3px;opacity:.4;}
.ml.you{color:#00FF88;align-self:flex-end;}
.ml.j{color:#00D4FF;}
.mb{max-width:80%;padding:8px 12px;font-family:'Share Tech Mono',monospace;
  font-size:11px;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
.mb.you{align-self:flex-end;background:rgba(0,255,136,.06);
  border:1px solid rgba(0,255,136,.2);border-radius:2px 2px 0 2px;color:#00FF88;}
.mb.j{align-self:flex-start;background:rgba(0,212,255,.06);
  border:1px solid rgba(0,212,255,.2);border-radius:2px 2px 2px 0;color:#b8e8ff;}
.cur{display:inline-block;width:6px;height:11px;background:#00D4FF;
  margin-left:2px;vertical-align:middle;animation:bk .65s step-end infinite;}

/* 브리핑 버튼 */
#brief-btn{
  position:fixed;bottom:22px;right:60px;z-index:11;
  background:transparent;border:1px solid rgba(0,212,255,.35);
  color:#00D4FF;font-family:'Share Tech Mono',monospace;
  font-size:9px;letter-spacing:3px;padding:7px 18px;cursor:pointer;transition:all .2s;
}
#brief-btn:hover{background:rgba(0,212,255,.1);border-color:#00D4FF;box-shadow:0 0 14px rgba(0,212,255,.3);}

/* 시계 */
#clock{position:fixed;top:22px;right:60px;z-index:10;
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;
  color:rgba(0,212,255,.4);}
</style>
</head>
<body>
<canvas id="three-canvas"></canvas>
<div id="scanlines"></div>

<!-- HUD -->
<div class="hc tl"></div><div class="hc tr"></div>
<div class="hc bl"></div><div class="hc br"></div>
<div id="status-wrap"><div id="sdot"></div><span id="stxt">STANDBY</span></div>
<div id="clock"></div>

<div id="hud-l">
  <div class="hi"><span>SYSTEM</span>ONLINE</div>
  <div class="hi"><span>NEURAL</span>ACTIVE</div>
  <div class="hi"><span>UPLINK</span>SECURE</div>
</div>
<div id="hud-r">
  <div class="hr">MK.VII<span>VERSION</span></div>
  <div class="hr">16 ACTIVE<span>AGENTS</span></div>
  <div class="hr" id="hr-date"></div>
</div>

<!-- 타이틀 -->
<div id="title">J.A.R.V.I.S<span id="title-line"></span></div>

<!-- 채팅 오버레이 -->
<div id="chat-overlay">
  <div id="msgs"></div>
  <div id="listen-bar">
    <div id="ldot"></div>
    <div id="ltxt">마이크 초기화 중...</div>
  </div>
</div>

<button id="brief-btn">▶ BRIEFING</button>
<audio id="tts-audio" style="display:none"></audio>

<script>
/* ══════════════════════════════════════════════
   THREE.JS 3D 구체
══════════════════════════════════════════════ */
const canvas3 = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({canvas:canvas3, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x020814, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
camera.position.z = 4.5;

function resize3(){
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
resize3();
window.addEventListener('resize', resize3);

/* 배경 그라디언트 (배경 구체) */
const bgGeo = new THREE.SphereGeometry(50, 16, 16);
const bgMat = new THREE.MeshBasicMaterial({
  color:0x020814, side:THREE.BackSide
});
scene.add(new THREE.Mesh(bgGeo, bgMat));

/* ── 메인 구체 그룹 ── */
const orbGroup = new THREE.Group();
scene.add(orbGroup);

/* ── 파티클 클라우드 (구체 형태, AdditiveBlending으로 글로우) ── */
const TOTAL = 2000;
const pos   = new Float32Array(TOTAL * 3);
const sizes = new Float32Array(TOTAL);

for(let i = 0; i < TOTAL; i++){
  // 구체 부피 안에 균일 분포 (안쪽 더 조밀)
  const u   = Math.random();
  const r   = 1.45 * Math.cbrt(u);          // cbrt → 부피 균일 분포
  const phi   = Math.acos(2*Math.random()-1);
  const theta = Math.random() * Math.PI * 2;
  pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  pos[i*3+2] = r * Math.cos(phi);
  sizes[i]   = Math.random() > 0.95 ? 0.025 : 0.008 + Math.random() * 0.01;
}

const cloudGeo = new THREE.BufferGeometry();
cloudGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
cloudGeo.setAttribute('size',     new THREE.Float32BufferAttribute(sizes, 1));

const cloudMat = new THREE.PointsMaterial({
  color: 0x1166ff,
  size: 0.022,
  transparent: true,
  opacity: 0.85,
  blending: THREE.AdditiveBlending,  // 겹칠수록 밝게 빛남
  depthWrite: false,
  sizeAttenuation: true,
});
const cloudPoints = new THREE.Points(cloudGeo, cloudMat);
orbGroup.add(cloudPoints);

/* 중간층 — 조금 더 밝은 파티클 */
const MID = 500;
const posM = new Float32Array(MID * 3);
for(let i = 0; i < MID; i++){
  const r   = 0.6 + Math.random() * 0.85;
  const phi   = Math.acos(2*Math.random()-1);
  const theta = Math.random() * Math.PI * 2;
  posM[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  posM[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  posM[i*3+2] = r * Math.cos(phi);
}
const midGeo = new THREE.BufferGeometry();
midGeo.setAttribute('position', new THREE.Float32BufferAttribute(posM, 3));
const midMat = new THREE.PointsMaterial({
  color: 0x44aaff,
  size: 0.018,
  transparent: true,
  opacity: 0.9,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
orbGroup.add(new THREE.Points(midGeo, midMat));

/* 코어 — 밝은 중심 */
const CORE = 150;
const posC = new Float32Array(CORE * 3);
for(let i = 0; i < CORE; i++){
  const r   = Math.random() * 0.4;
  const phi   = Math.acos(2*Math.random()-1);
  const theta = Math.random() * Math.PI * 2;
  posC[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  posC[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  posC[i*3+2] = r * Math.cos(phi);
}
const coreGeo2 = new THREE.BufferGeometry();
coreGeo2.setAttribute('position', new THREE.Float32BufferAttribute(posC, 3));
const coreMat2 = new THREE.PointsMaterial({
  color: 0xaaddff,
  size: 0.025,
  transparent: true,
  opacity: 1.0,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
orbGroup.add(new THREE.Points(coreGeo2, coreMat2));

/* 궤도 링 (얇게 유지) */
function makeRing(r, tube, color, rotX, rotZ, opacity=0.25){
  const geo = new THREE.TorusGeometry(r, tube, 4, 80);
  const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity});
  const m   = new THREE.Mesh(geo, mat);
  m.rotation.x = rotX; m.rotation.z = rotZ;
  return m;
}
orbGroup.add(makeRing(1.7, 0.003, 0x0055aa, Math.PI/2,    0,         0.3));
orbGroup.add(makeRing(1.7, 0.003, 0x0044aa, Math.PI/4,    Math.PI/6, 0.18));
orbGroup.add(makeRing(1.85,0.002, 0x003377, Math.PI*0.6,  Math.PI/3, 0.15));

/* ── 애니메이션 상태 ── */
let appMode = 'idle';
let breathT = 0;

function setMode(m){
  appMode=m;
  const dot=document.getElementById('sdot');
  const txt=document.getElementById('stxt');
  const map={idle:'STANDBY',listening:'LISTENING',speaking:'PROCESSING'};
  txt.textContent=map[m]||m.toUpperCase();
  dot.className=m!=='idle'?'on':'';
}

/* ── 렌더 루프 ── */
let clock3 = new THREE.Clock();

renderer.setAnimationLoop(()=>{
  const dt = clock3.getDelta();
  breathT += dt;

  let targetScale;
  if     (appMode==='idle')      targetScale = 1 + 0.025*Math.sin(breathT*0.7);
  else if(appMode==='listening') targetScale = 1 + 0.12*Math.abs(Math.sin(breathT*3.5));
  else                           targetScale = 1 + 0.04*Math.sin(breathT*2);

  orbGroup.scale.lerp(new THREE.Vector3(targetScale,targetScale,targetScale),0.06);

  // 천천히 회전
  const rotSpeed = appMode==='idle' ? 0.07 : appMode==='listening' ? 0.25 : 0.12;
  orbGroup.rotation.y += dt * rotSpeed;
  orbGroup.rotation.x  = Math.sin(breathT*0.15)*0.08;

  cloudPoints.rotation.y -= dt * 0.03;

  // 코어 펄스
  const coreAlpha = 0.85 + 0.15*Math.abs(Math.sin(breathT*1.5));
  coreMat2.opacity = coreAlpha;
  cloudMat.opacity = 0.7 + 0.15*Math.abs(Math.sin(breathT*0.8));

  renderer.render(scene, camera);
});

/* ══════════════════════════════════════════════
   채팅
══════════════════════════════════════════════ */
const msgsEl = document.getElementById('msgs');
let streamBubble = null;
let streamText   = '';

function addMsg(role, text){
  const w=document.createElement('div'); w.className='mw';
  const l=document.createElement('div'); l.className=`ml ${role}`;
  l.textContent=role==='you'?'YOU':'JARVIS';
  const b=document.createElement('div'); b.className=`mb ${role}`;
  b.textContent=text;
  w.appendChild(l); w.appendChild(b);
  msgsEl.appendChild(w);
  // 최대 4개만 유지
  while(msgsEl.children.length>4) msgsEl.removeChild(msgsEl.firstChild);
  return b;
}

function startStream(){
  const w=document.createElement('div'); w.className='mw';
  const l=document.createElement('div'); l.className='ml j'; l.textContent='JARVIS';
  streamBubble=document.createElement('div'); streamBubble.className='mb j';
  const cur=document.createElement('span'); cur.className='cur';
  streamBubble.appendChild(cur);
  w.appendChild(l); w.appendChild(streamBubble);
  msgsEl.appendChild(w);
  while(msgsEl.children.length>4) msgsEl.removeChild(msgsEl.firstChild);
}

function appendStream(chunk){
  if(!streamBubble) startStream();
  streamText+=chunk;
  const cur=streamBubble.querySelector('.cur');
  const t=document.createTextNode(chunk);
  streamBubble.insertBefore(t,cur);
}

function endStream(){
  if(streamBubble){const c=streamBubble.querySelector('.cur');if(c)c.remove();}
  streamBubble=null; streamText='';
}

/* ══════════════════════════════════════════════
   Socket.IO
══════════════════════════════════════════════ */
const socket=io('http://localhost:5001');
socket.on('connect',    ()=>{});
socket.on('state',      d=>setMode(d.status==='idle'?'idle':d.status==='listening'?'listening':'speaking'));
socket.on('wake',       d=>{
  const ltxt=document.getElementById('ltxt');
  ltxt.textContent=`⬡ 감지: "${d.heard}"`;
  ltxt.style.color='rgba(0,255,136,.7)';
  setMode('listening');
  setTimeout(()=>{ltxt.style.color='rgba(0,212,255,.4)';},3000);
});
socket.on('chat_user',  t=>{setMode('listening');});  // 프론트에서 이미 추가함
socket.on('speak_now',  t=>{addMsg('j',t);});
socket.on('text_chunk', c=>{setMode('speaking');appendStream(c);});
socket.on('text_done',  f=>{endStream();setMode('idle');});  // 스트림 버블 이미 있음
socket.on('data',       d=>{if(d.stocks)renderStocks(d.stocks);});
socket.on('error',      e=>{addMsg('j',`⚠ ${e}`);setMode('idle');});

function renderStocks(stocks){
  const el=document.getElementById('hud-l');
  el.innerHTML='';
  stocks.slice(0,3).forEach(s=>{
    const chg=typeof s.change==='number'?s.change:0;
    const col=chg>=0?'#00FF88':'#FF4466';
    const d=document.createElement('div'); d.className='hi';
    d.innerHTML=`<span>${s.symbol}</span>${s.price} <span style="color:${col}">${chg>=0?'+':''}${chg.toFixed(2)}%</span>`;
    el.appendChild(d);
  });
}

/* ══════════════════════════════════════════════
   Web Speech API — 실시간 음성 인식
══════════════════════════════════════════════ */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const ldot=document.getElementById('ldot');
const ltxt=document.getElementById('ltxt');

if(SR){
  const rec=new SR();
  rec.lang='ko-KR'; rec.continuous=true; rec.interimResults=true;
  rec.onstart=()=>{ldot.className='on';ltxt.textContent='듣고 있습니다...';ltxt.style.color='rgba(0,212,255,.5)';};
  rec.onend=()=>{ldot.className='';ltxt.textContent='마이크 대기...';setTimeout(()=>{try{rec.start();}catch(e){}},400);};
  rec.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      e.results[i].isFinal?final+=t:interim+=t;
    }
    if(interim){ltxt.textContent=interim;ltxt.style.color='rgba(0,255,136,.8)';setMode('listening');}
    if(final.trim()){
      ltxt.textContent='전송 중...';ltxt.style.color='rgba(0,212,255,.5)';
      socket.emit('user_message',{text:final.trim()});
      addMsg('you',final.trim());
      setMode('listening');
    }
  };
  rec.onerror=(e)=>{if(e.error==='not-allowed')ltxt.textContent='마이크 권한을 허용해주세요';};
  try{rec.start();}catch(e){}
}else{ltxt.textContent='Chrome에서 열어주세요 (음성인식 필요)';}

/* 브리핑 */
document.getElementById('brief-btn').addEventListener('click',()=>{
  fetch('/trigger_briefing').catch(()=>{});
  addMsg('you','브리핑 시작');setMode('listening');
});

/* 시계 */
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('hr-date').innerHTML=n.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'})+'<span>DATE</span>';
}
tick();setInterval(tick,1000);
</script>
</body>
</html>
