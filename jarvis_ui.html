<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S.</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Orbitron', 'Courier New', monospace;
    user-select: none;
  }

  #root { width: 100vw; height: 100vh; }

  /* ── 배경 스캔라인 ── */
  .scanlines {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 212, 255, 0.015) 2px,
      rgba(0, 212, 255, 0.015) 4px
    );
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove {
    from { background-position: 0 0; }
    to   { background-position: 0 100px; }
  }

  /* ── HUD 코너 브라켓 ── */
  .corner {
    position: fixed; width: 60px; height: 60px; z-index: 10;
    opacity: 0.6;
  }
  .corner::before, .corner::after {
    content: ''; position: absolute;
    background: #00D4FF;
  }
  .corner::before { width: 2px; height: 100%; }
  .corner::after  { width: 100%; height: 2px; }
  .corner.tl { top: 24px; left: 24px; }
  .corner.tl::before { top: 0; left: 0; }
  .corner.tl::after  { top: 0; left: 0; }
  .corner.tr { top: 24px; right: 24px; }
  .corner.tr::before { top: 0; right: 0; }
  .corner.tr::after  { top: 0; right: 0; }
  .corner.bl { bottom: 24px; left: 24px; }
  .corner.bl::before { bottom: 0; left: 0; }
  .corner.bl::after  { bottom: 0; left: 0; }
  .corner.br { bottom: 24px; right: 24px; }
  .corner.br::before { bottom: 0; right: 0; }
  .corner.br::after  { bottom: 0; right: 0; }

  /* ── 좌측 HUD 패널 ── */
  .hud-left {
    position: fixed; left: 32px; top: 50%;
    transform: translateY(-50%);
    z-index: 10; opacity: 0.5;
    display: flex; flex-direction: column; gap: 16px;
  }
  .hud-item {
    font-size: 9px; letter-spacing: 2px;
    color: #00D4FF; line-height: 1.8;
    border-left: 1px solid rgba(0,212,255,0.3);
    padding-left: 10px;
  }
  .hud-item span { display: block; color: rgba(0,212,255,0.5); }

  /* ── 우측 HUD 패널 ── */
  .hud-right {
    position: fixed; right: 32px; top: 50%;
    transform: translateY(-50%);
    z-index: 10; opacity: 0.5;
    display: flex; flex-direction: column; gap: 16px;
    align-items: flex-end;
  }
  .hud-item-r {
    font-size: 9px; letter-spacing: 2px;
    color: #00D4FF; line-height: 1.8;
    border-right: 1px solid rgba(0,212,255,0.3);
    padding-right: 10px; text-align: right;
  }
  .hud-item-r span { display: block; color: rgba(0,212,255,0.5); }

  /* ── 하단 상태 텍스트 ── */
  .status-bar {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%);
    z-index: 10; text-align: center;
  }
  .status-text {
    font-size: 11px; letter-spacing: 6px;
    color: #00D4FF; opacity: 0.7;
  }
  .status-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; margin-right: 8px;
    background: #00D4FF;
    animation: dotPulse 1s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  /* ── 캔버스 래퍼 ── */
  .orb-wrapper {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
  }

  /* ── 키 힌트 ── */
  .key-hint {
    position: fixed; bottom: 70px; left: 50%;
    transform: translateX(-50%);
    font-size: 8px; letter-spacing: 3px;
    color: rgba(0,212,255,0.25); z-index: 10;
  }

  /* ── 상단 타이틀 ── */
  .title {
    position: fixed; top: 32px; left: 50%;
    transform: translateX(-50%);
    font-size: 13px; letter-spacing: 10px;
    color: rgba(0,212,255,0.5); z-index: 10;
    font-weight: 700;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── 유틸 ── */
const TWO_PI = Math.PI * 2;
const lerp = (a, b, t) => a + (b - a) * t;

/* ── 상수 ── */
const C1 = '#00D4FF';
const C2 = '#0066FF';
const C3 = '#004499';

/* ── 메인 컴포넌트 ── */
function JarvisUI() {
  const [mode, setMode] = useState('idle'); // idle | listening | speaking
  const canvasRef = useRef(null);
  const stateRef  = useRef({ mode: 'idle', t: 0, ripples: [], breathScale: 1 });

  /* 키보드 단축키 */
  useEffect(() => {
    const onKey = (e) => {
      if (e.code === 'Space')  { e.preventDefault(); setMode(m => m === 'listening' ? 'idle' : 'listening'); }
      if (e.code === 'Enter')  { setMode(m => m === 'speaking'  ? 'idle' : 'speaking'); }
      if (e.code === 'Escape') { setMode('idle'); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  /* mode 변경 시 stateRef 동기화 */
  useEffect(() => {
    stateRef.current.mode = mode;
    if (mode === 'speaking') {
      // 말할 때 리플 초기화
      stateRef.current.ripples = [];
    }
  }, [mode]);

  /* 애니메이션 루프 */
  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let animId;
    let lastTime = 0;

    const resize = () => {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    const draw = (ts) => {
      const dt = (ts - lastTime) / 1000;
      lastTime = ts;
      const s = stateRef.current;
      s.t += dt;

      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;
      const BASE_R = Math.min(canvas.width, canvas.height) * 0.18;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      /* ── 배경 방사형 그라디언트 ── */
      const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, BASE_R * 3);
      bgGrad.addColorStop(0,   'rgba(0,40,80,0.15)');
      bgGrad.addColorStop(0.4, 'rgba(0,20,50,0.08)');
      bgGrad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const { mode } = s;

      /* ── 숨쉬기 스케일 계산 ── */
      let targetBreath;
      if      (mode === 'idle')      targetBreath = 1 + 0.035 * Math.sin(s.t * 0.7);
      else if (mode === 'listening') targetBreath = 1 + 0.18  * Math.abs(Math.sin(s.t * 3.5));
      else                           targetBreath = 1 + 0.05  * Math.sin(s.t * 1.5);
      s.breathScale = lerp(s.breathScale, targetBreath, 0.08);
      const R = BASE_R * s.breathScale;

      /* ── 리플 (speaking) ── */
      if (mode === 'speaking') {
        if (s.t % 0.45 < dt + 0.01) {
          s.ripples.push({ r: R, alpha: 0.8, speed: BASE_R * 0.9 });
        }
      }
      s.ripples = s.ripples.filter(rp => rp.alpha > 0.01);
      s.ripples.forEach(rp => {
        rp.r     += rp.speed * dt;
        rp.alpha *= 0.96;
        ctx.beginPath();
        ctx.arc(cx, cy, rp.r, 0, TWO_PI);
        ctx.strokeStyle = `rgba(0,212,255,${rp.alpha * 0.5})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });

      /* ── 외부 링 3 (느린 회전, 틱 마크) ── */
      drawTickRing(ctx, cx, cy, R * 2.8, s.t * 0.12, 72, mode);

      /* ── 외부 링 2 (호 세그먼트) ── */
      drawArcRing(ctx, cx, cy, R * 2.2, -s.t * 0.25, 6, mode);

      /* ── 외부 링 1 (빠른 회전 호) ── */
      drawArcRing(ctx, cx, cy, R * 1.65, s.t * 0.55, 3, mode);

      /* ── 외부 글로우 ── */
      const outerGlow = ctx.createRadialGradient(cx, cy, R * 0.7, cx, cy, R * 1.5);
      const glowAlpha = mode === 'idle' ? 0.12 : mode === 'listening' ? 0.3 : 0.2;
      outerGlow.addColorStop(0, `rgba(0,212,255,${glowAlpha})`);
      outerGlow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = outerGlow;
      ctx.beginPath();
      ctx.arc(cx, cy, R * 1.5, 0, TWO_PI);
      ctx.fill();

      /* ── 메인 orb ── */
      drawOrb(ctx, cx, cy, R, s.t, mode);

      /* ── listening 파티클 ── */
      if (mode === 'listening') {
        drawParticles(ctx, cx, cy, R, s.t);
      }

      animId = requestAnimationFrame(draw);
    };

    animId = requestAnimationFrame(draw);
    return () => {
      cancelAnimationFrame(animId);
      window.removeEventListener('resize', resize);
    };
  }, []);

  const statusMap = { idle: 'STANDBY', listening: 'LISTENING', speaking: 'PROCESSING' };

  return (
    <>
      <div className="scanlines" />

      {/* 코너 브라켓 */}
      <div className="corner tl" />
      <div className="corner tr" />
      <div className="corner bl" />
      <div className="corner br" />

      {/* 상단 타이틀 */}
      <div className="title">J . A . R . V . I . S</div>

      {/* 좌측 HUD */}
      <div className="hud-left">
        <div className="hud-item"><span>SYSTEM</span>ONLINE</div>
        <div className="hud-item"><span>NEURAL</span>ACTIVE</div>
        <div className="hud-item"><span>UPLINK</span>SECURE</div>
        <div className="hud-item"><span>CORE TEMP</span>36.2°C</div>
      </div>

      {/* 우측 HUD */}
      <div className="hud-right">
        <div className="hud-item-r"><span>VERSION</span>MK.VII</div>
        <div className="hud-item-r"><span>POWER</span>100%</div>
        <div className="hud-item-r"><span>AGENTS</span>16 ACTIVE</div>
        <div className="hud-item-r"><span>MODE</span>{statusMap[mode]}</div>
      </div>

      {/* 캔버스 */}
      <div className="orb-wrapper">
        <canvas ref={canvasRef} style={{ display:'block' }} />
      </div>

      {/* 하단 상태 */}
      <div className="status-bar">
        <div className="key-hint">SPACE · LISTEN &nbsp;&nbsp; ENTER · SPEAK &nbsp;&nbsp; ESC · IDLE</div>
        <div className="status-text">
          <span className="status-dot" />
          {statusMap[mode]}
        </div>
      </div>
    </>
  );
}

/* ── 메인 Orb 그리기 ── */
function drawOrb(ctx, cx, cy, R, t, mode) {
  // 외부 테두리 광선
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, TWO_PI);
  const borderAlpha = mode === 'idle' ? 0.6 : 1;
  ctx.strokeStyle = `rgba(0,212,255,${borderAlpha})`;
  ctx.lineWidth = mode === 'listening' ? 2.5 : 1.5;
  ctx.stroke();

  // 내부 그라디언트
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
  if (mode === 'idle') {
    grad.addColorStop(0,   'rgba(0,80,180,0.5)');
    grad.addColorStop(0.5, 'rgba(0,50,120,0.3)');
    grad.addColorStop(1,   'rgba(0,20,60,0.1)');
  } else if (mode === 'listening') {
    grad.addColorStop(0,   'rgba(0,180,255,0.7)');
    grad.addColorStop(0.4, 'rgba(0,100,200,0.5)');
    grad.addColorStop(1,   'rgba(0,30,80,0.2)');
  } else {
    grad.addColorStop(0,   'rgba(0,120,255,0.6)');
    grad.addColorStop(0.5, 'rgba(0,70,160,0.4)');
    grad.addColorStop(1,   'rgba(0,20,60,0.1)');
  }
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, TWO_PI);
  ctx.fill();

  // 내부 헥사곤 패턴
  drawHexPattern(ctx, cx, cy, R * 0.55, t * 0.08, mode);

  // 중앙 빛점
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.3);
  coreGrad.addColorStop(0,   'rgba(200,240,255,0.9)');
  coreGrad.addColorStop(0.3, 'rgba(0,212,255,0.5)');
  coreGrad.addColorStop(1,   'rgba(0,100,200,0)');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.3, 0, TWO_PI);
  ctx.fill();
}

/* ── 헥사곤 내부 패턴 ── */
function drawHexPattern(ctx, cx, cy, R, angle, mode) {
  const alpha = mode === 'idle' ? 0.15 : 0.3;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.strokeStyle = `rgba(0,212,255,${alpha})`;
  ctx.lineWidth = 0.5;

  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * TWO_PI;
    const x1 = Math.cos(a) * R * 0.3;
    const y1 = Math.sin(a) * R * 0.3;
    const x2 = Math.cos(a) * R;
    const y2 = Math.sin(a) * R;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // 헥사곤 테두리
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * TWO_PI - Math.PI / 6;
    const x = Math.cos(a) * R;
    const y = Math.sin(a) * R;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.strokeStyle = `rgba(0,212,255,${alpha * 1.5})`;
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

/* ── 호 세그먼트 링 ── */
function drawArcRing(ctx, cx, cy, R, angle, segments, mode) {
  const gap = 0.15;
  const alpha = mode === 'idle' ? 0.35 : 0.7;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  for (let i = 0; i < segments; i++) {
    const start = (i / segments) * TWO_PI + gap;
    const end   = ((i + 1) / segments) * TWO_PI - gap;

    ctx.beginPath();
    ctx.arc(0, 0, R, start, end);
    ctx.strokeStyle = `rgba(0,212,255,${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 세그먼트 끝에 작은 점
    const dotA = end;
    ctx.beginPath();
    ctx.arc(Math.cos(dotA) * R, Math.sin(dotA) * R, 2.5, 0, TWO_PI);
    ctx.fillStyle = `rgba(0,212,255,${alpha * 1.5})`;
    ctx.fill();
  }
  ctx.restore();
}

/* ── 틱 마크 링 ── */
function drawTickRing(ctx, cx, cy, R, angle, ticks, mode) {
  const alpha = mode === 'idle' ? 0.2 : 0.45;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  for (let i = 0; i < ticks; i++) {
    const a = (i / ticks) * TWO_PI;
    const isMajor = i % 9 === 0;
    const len = isMajor ? 12 : 5;
    const x1 = Math.cos(a) * R;
    const y1 = Math.sin(a) * R;
    const x2 = Math.cos(a) * (R - len);
    const y2 = Math.sin(a) * (R - len);

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(0,212,255,${isMajor ? alpha * 2 : alpha})`;
    ctx.lineWidth = isMajor ? 1.5 : 0.5;
    ctx.stroke();
  }
  ctx.restore();
}

/* ── listening 파티클 ── */
function drawParticles(ctx, cx, cy, R, t) {
  const count = 12;
  for (let i = 0; i < count; i++) {
    const a = (i / count) * TWO_PI + t * 0.8;
    const dist = R * 1.1 + Math.sin(t * 3 + i) * R * 0.25;
    const x = cx + Math.cos(a) * dist;
    const y = cy + Math.sin(a) * dist;
    const alpha = 0.4 + 0.4 * Math.abs(Math.sin(t * 2 + i * 0.7));
    const size  = 1.5 + 1.5 * Math.abs(Math.sin(t * 2.5 + i));

    ctx.beginPath();
    ctx.arc(x, y, size, 0, TWO_PI);
    ctx.fillStyle = `rgba(0,212,255,${alpha})`;
    ctx.fill();
  }
}

/* ── React DOM 렌더 ── */
ReactDOM.createRoot(document.getElementById('root')).render(<JarvisUI />);
</script>
</body>
</html>
